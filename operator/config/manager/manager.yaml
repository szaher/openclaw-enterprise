apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-operator-manager
  namespace: openclaw-system
  labels:
    app.kubernetes.io/name: openclaw-operator
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: openclaw-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-operator
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-operator
        app.kubernetes.io/component: manager
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: openclaw-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: ghcr.io/szaher/openclaw-enterprise/operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: webhook
              containerPort: 9443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
