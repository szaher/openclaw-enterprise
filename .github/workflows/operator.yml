name: Operator CI

on:
  push:
    branches: [main]
    paths:
      - 'operator/**'
  pull_request:
    branches: [main]
    paths:
      - 'operator/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/operator

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: operator/go.sum

      - name: Run tests
        run: go test ./... -coverprofile cover.out -race

      - name: Run vet
        run: go vet ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract operator metadata
        id: meta-operator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push operator (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: operator
          file: operator/config/manager/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha,scope=operator
          cache-to: type=gha,mode=max,scope=operator

  build-pr:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator (multi-arch, no push)
        uses: docker/build-push-action@v6
        with:
          context: operator
          file: operator/config/manager/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=operator
          cache-to: type=gha,mode=max,scope=operator
