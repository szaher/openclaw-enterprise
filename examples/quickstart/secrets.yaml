# Quickstart: Secrets
# Placeholder secrets for OpenClaw Enterprise. You MUST replace all placeholder
# values before applying. Never commit real credentials to version control.
#
# Replace instructions:
#   - POSTGRES_CONNECTION_STRING: Your PostgreSQL connection string
#     e.g., postgres://openclaw:password@postgres.example.com:5432/openclaw?sslmode=require
#   - REDIS_CONNECTION_STRING: Your Redis connection string
#     e.g., redis://:password@redis.example.com:6379/0
#   - SSO_CLIENT_SECRET: The client secret from your OIDC provider
#
# Usage: kubectl apply -f secrets.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-postgres
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
type: Opaque
stringData:
  # Replace with your actual PostgreSQL connection string
  connection-string: "postgres://openclaw:CHANGE_ME@postgres.example.com:5432/openclaw?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-redis
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
type: Opaque
stringData:
  # Replace with your actual Redis connection string
  connection-string: "redis://:CHANGE_ME@redis.example.com:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-sso
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
type: Opaque
stringData:
  # Replace with your OIDC provider's client secret
  client-secret: "CHANGE_ME_SSO_CLIENT_SECRET"
