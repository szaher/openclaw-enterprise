# Air-Gapped: ImagePullSecret for Private Registry
# Allows Kubernetes to pull OpenClaw Enterprise images from your private
# container registry in an air-gapped environment.
#
# To create the dockerconfigjson value:
#   1. Log in to your private registry:
#      docker login registry.internal.local
#   2. Base64-encode the Docker config:
#      cat ~/.docker/config.json | base64 -w 0
#   3. Replace the placeholder below with the output
#
# Alternatively, create the secret imperatively:
#   kubectl create secret docker-registry openclaw-registry \
#     --namespace openclaw-enterprise \
#     --docker-server=registry.internal.local \
#     --docker-username=YOUR_USERNAME \
#     --docker-password=YOUR_PASSWORD \
#     --docker-email=admin@your-company.com
#
# Usage: kubectl apply -f imagepullsecret.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-registry
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
    environment: air-gapped
type: kubernetes.io/dockerconfigjson
data:
  # Replace with your base64-encoded Docker config JSON
  # Example structure (before base64 encoding):
  # {
  #   "auths": {
  #     "registry.internal.local": {
  #       "username": "YOUR_USERNAME",
  #       "password": "YOUR_PASSWORD",
  #       "auth": "base64(username:password)"
  #     }
  #   }
  # }
  .dockerconfigjson: "REPLACE_WITH_BASE64_ENCODED_DOCKER_CONFIG_JSON"
