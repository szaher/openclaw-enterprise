# Production: Secrets
# Production secrets using SealedSecrets for GitOps-safe storage.
# In production, NEVER store raw secrets in Git. Use SealedSecrets, Vault,
# or an external secrets operator.
#
# To create SealedSecrets:
#   1. Install SealedSecrets controller: https://sealed-secrets.netlify.app/
#   2. Create a regular Secret YAML with real values
#   3. Seal it: kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#   4. Replace the encryptedData values below with your sealed values
#
# Usage: kubectl apply -f secrets.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: openclaw-postgres
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # Replace with your kubeseal-encrypted PostgreSQL connection string
    connection-string: "AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq..."
  template:
    metadata:
      name: openclaw-postgres
      namespace: openclaw-enterprise
      labels:
        app.kubernetes.io/part-of: openclaw-enterprise
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: openclaw-redis
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  encryptedData:
    # Replace with your kubeseal-encrypted Redis connection string
    connection-string: "AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq..."
  template:
    metadata:
      name: openclaw-redis
      namespace: openclaw-enterprise
      labels:
        app.kubernetes.io/part-of: openclaw-enterprise
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: openclaw-sso
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  encryptedData:
    # Replace with your kubeseal-encrypted OIDC client secret
    client-secret: "AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq..."
  template:
    metadata:
      name: openclaw-sso
      namespace: openclaw-enterprise
      labels:
        app.kubernetes.io/part-of: openclaw-enterprise
    type: Opaque
