# Production: Namespace Setup
# Creates namespaces with additional labels for production monitoring and policies.
#
# Usage: kubectl apply -f namespace.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-system
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
    app.kubernetes.io/managed-by: openclaw-operator
    environment: production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
    app.kubernetes.io/managed-by: openclaw-operator
    environment: production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
