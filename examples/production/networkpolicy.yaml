# Production: Network Policies
# Restricts network traffic to only what is necessary. Implements a default-deny
# posture with explicit allow rules for OpenClaw Enterprise components.
#
# Policies:
#   1. Default deny all ingress/egress in the namespace
#   2. Allow gateway to receive traffic from ingress controller
#   3. Allow gateway to connect to PostgreSQL, Redis, and OPA
#   4. Allow OPA to receive policy queries from gateway
#   5. Allow DNS resolution
#
# Usage: kubectl apply -f networkpolicy.yaml
---
# Default deny all traffic in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow ingress to gateway pods from the ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# Allow gateway egress to PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-postgres
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 5432
---
# Allow gateway egress to Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-redis
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6379
---
# Allow gateway to query OPA sidecar
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-opa
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: opa
      ports:
        - protocol: TCP
          port: 8181
---
# Allow OPA to receive queries from gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-opa-from-gateway
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: opa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - protocol: TCP
          port: 8181
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow gateway egress to external integrations (HTTPS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-external-https
  namespace: openclaw-enterprise
  labels:
    app.kubernetes.io/part-of: openclaw-enterprise
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
